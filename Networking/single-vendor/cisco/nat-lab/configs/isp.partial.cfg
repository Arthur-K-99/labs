! =============================================================================
! ISP Router - Internet Backbone
! Provides "public" IP connectivity to all sites
! =============================================================================
!
hostname ISP
!
interface Ethernet0/1
 description TO_EXTERNAL_SERVER
 ip address 203.0.113.1 255.255.255.0
 no shutdown
!
interface Ethernet0/2
 description TO_HQ
 ip address 198.51.100.1 255.255.255.252
 no shutdown
!
interface Ethernet0/3
 description TO_BRANCH1
 ip address 100.64.0.1 255.255.255.252
 no shutdown
!
interface Ethernet1/0
 description TO_BRANCH2
 ip address 100.64.0.5 255.255.255.252
 no shutdown
!
! ── Routes to HQ's public NAT pool and translated addresses ──
ip route 198.51.100.4 255.255.255.252 198.51.100.2
ip route 198.51.100.8 255.255.255.248 198.51.100.2
ip route 198.51.100.16 255.255.255.240 198.51.100.2
!
! ── Route for BR2 Twice-NAT translated range ──
ip route 10.10.10.0 255.255.255.0 100.64.0.6
!
end