! =============================================================================
! Branch 2 Router (IOL) - Twice NAT / Overlapping Networks
! =============================================================================
! Scenario 6: TWICE NAT
!
! Problem: Both HQ and BR2 use 192.168.10.0/24
! When BR2 hosts (192.168.10.x) try to reach HQ hosts
! (also 192.168.10.x), routing breaks.
!
! Solution: Translate BOTH source AND destination:
!   - BR2 source 192.168.10.x → 10.10.10.x (NAT source)
!   - HQ destination 192.168.10.x appears as 10.20.20.x
!     from BR2's perspective
!
! So from BR2-PC's view:
!   "I'm talking to 10.20.20.10" (which is really HQ 192.168.10.10)
!   "My source becomes 10.10.10.10" (which ISP/HQ routes back to BR2)
! =============================================================================
!
hostname BR2
!
interface Ethernet0/1
 description TO_ISP (OUTSIDE)
 ip address 100.64.0.6 255.255.255.252
 ip nat outside
 no shutdown
!
interface Ethernet0/2
 description TO_BR2_LAN (INSIDE)
 ip address 192.168.10.1 255.255.255.0
 ip nat inside
 no shutdown
!
! ─────────────────────────────────────────────
! TWICE NAT CONFIGURATION
!
! Static NAT for source translation:
! Inside local 192.168.10.10 → Inside global 10.10.10.10
!
! Static NAT for destination translation:
! Outside global 10.20.20.10 → Outside local 192.168.10.10 (at HQ)
! ─────────────────────────────────────────────
!
! Step 1: Translate BR2 source addresses
ip nat inside source static 192.168.10.10 10.10.10.10
!
! Step 2: Translate the destination (HQ addresses as seen by BR2)
! When BR2-PC sends to 10.20.20.10, NAT translates dst to 192.168.10.10
ip nat outside source static 192.168.10.10 10.20.20.10
!
! Step 3: Route the "virtual" HQ subnet toward ISP
! (ISP will forward to HQ's real 192.168.10.0/24)
ip route 10.20.20.0 255.255.255.0 100.64.0.5
!
! ─────────────────────────────────────────────
! Also add basic PAT for general internet access
! ─────────────────────────────────────────────
ip access-list standard BR2-LAN
 permit 192.168.10.0 0.0.0.255
!
ip nat inside source list BR2-LAN interface Ethernet0/1 overload
!
! ─────────────────────────────────────────────
! DEFAULT ROUTE
! ─────────────────────────────────────────────
ip route 0.0.0.0 0.0.0.0 100.64.0.5
!
end