! =============================================================================
! HQ Router (C8000v) - MASTER NAT DEVICE
! =============================================================================
! Scenarios:
!   1) Static NAT        - DMZ server 172.16.0.100 ↔ 198.51.100.10
!   2) Static PAT         - 198.51.100.2:8080 → 172.16.0.100:80
!                          - 198.51.100.2:8443 → 172.16.0.100:443
!   3) Dynamic NAT Pool   - HQ LAN 192.168.10.0/24 → Pool 198.51.100.16-30
!   4) NAT Hairpinning    - Internal hosts access DMZ via public IP
! =============================================================================
!
hostname HQ
!
! ── Management VRF (containerlab requirement for c8000v) ──
vrf definition MGMT
 address-family ipv4
 exit-address-family
!
interface GigabitEthernet1
 vrf forwarding MGMT
 ip address dhcp
 no shutdown
!
ip route vrf MGMT 0.0.0.0 0.0.0.0 10.0.0.2
!
! ─────────────────────────────────────────────
! DATA INTERFACES
! ─────────────────────────────────────────────
interface GigabitEthernet2
 description TO_ISP (OUTSIDE)
 ip address 198.51.100.2 255.255.255.252
 ip nat outside
 no shutdown
!
interface GigabitEthernet3
 description TO_HQ_LAN (INSIDE)
 ip address 192.168.10.1 255.255.255.0
 ip nat inside
 no shutdown
!
interface GigabitEthernet4
 description TO_DMZ (INSIDE)
 ip address 172.16.0.1 255.255.255.0
 ip nat inside
 no shutdown
!
! ─────────────────────────────────────────────
! SCENARIO 1: STATIC NAT (1:1)
! DMZ server internal 172.16.0.100 ↔ public 198.51.100.10
! ─────────────────────────────────────────────
ip nat inside source static 172.16.0.100 198.51.100.10
!
! ─────────────────────────────────────────────
! SCENARIO 2: STATIC PAT (Port Forwarding)
! External port 8080 → DMZ server port 80 (HTTP)
! External port 8443 → DMZ server port 443 (HTTPS)
! ─────────────────────────────────────────────
ip nat inside source static tcp 172.16.0.100 80 198.51.100.2 8080
ip nat inside source static tcp 172.16.0.100 443 198.51.100.2 8443
!
! ─────────────────────────────────────────────
! SCENARIO 3: DYNAMIC NAT WITH POOL
! HQ LAN hosts use addresses from a public pool
! ─────────────────────────────────────────────
ip nat pool HQ-PUBLIC-POOL 198.51.100.16 198.51.100.30 netmask 255.255.255.240
!
ip access-list standard HQ-LAN-HOSTS
 permit 192.168.10.0 0.0.0.255
!
ip nat inside source list HQ-LAN-HOSTS pool HQ-PUBLIC-POOL
!
! ─────────────────────────────────────────────
! SCENARIO 7: NAT HAIRPINNING (NAT LOOPBACK)
!
! Enable NVI interface for hairpin NAT so that
! internal hosts can reach the DMZ server using
! its PUBLIC IP 198.51.100.10 from the inside.
!
! Note: IOS-XE hairpin NAT works when both
! "ip nat inside" interfaces communicate
! through a static NAT entry. Traffic from
! GigabitEthernet3 (inside) destined for
! 198.51.100.10 hits the outside NAT rule,
! gets translated, and is routed back to Gi4
! (also inside). This "inside-to-inside"
! hairpin is supported on C8000v/IOS-XE with
! the "ip nat inside source" static rule
! already in place.
! ─────────────────────────────────────────────
! The static NAT from Scenario 1 already enables this.
! Additionally, ensure both inside interfaces have
! ip nat inside (already configured above).
!
! For IOS-XE, hairpinning works natively when:
!   - Source is on an "ip nat inside" interface
!   - Destination matches a "ip nat inside source static" entry
!   - The real server is also on an "ip nat inside" interface
!
! ─────────────────────────────────────────────
! DEFAULT ROUTE
! ─────────────────────────────────────────────
ip route 0.0.0.0 0.0.0.0 198.51.100.1
!
! ─────────────────────────────────────────────
! ACCESS / SSH
! ─────────────────────────────────────────────
aaa new-model
aaa authentication login default local
aaa authorization exec default local
!
username admin privilege 15 secret admin
!
line vty 0 4
 login local
 transport input ssh
!
ip domain-name nat-lab.local
crypto key generate rsa modulus 2048
ip ssh version 2
!
end